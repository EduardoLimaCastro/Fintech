version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: auth-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    container_name: auth-service
    restart: unless-stopped
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/auth_service
      DB_USER: postgres
      DB_PASSWORD: password
    networks:
      - auth-network

volumes:
    postgres_data:

networks:
    auth-network:
