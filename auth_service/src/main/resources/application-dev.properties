spring.application.name=auth-service
server.port=8015
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5437/auth_service}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

springdoc.swagger-ui.path=/swagger-ui.html

# OAuth2 Clients registrados no Authorization Server
clients.account-service.secret=${ACCOUNT_SERVICE_CLIENT_SECRET:account-service-secret}
