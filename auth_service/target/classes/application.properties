spring.application.name=auth-service
server.port=8015
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

spring.profiles.active=dev
springdoc.swagger-ui.path=/swagger-ui.html
# OAuth2 Clients registrados no Authorization Server
clients.account-service.secret=${ACCOUNT_SERVICE_CLIENT_SECRET:account-service-secret}

# Observabilidade
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
loki.url=${LOKI_URL:http://localhost:3100}
