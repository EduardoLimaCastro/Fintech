version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: transaction-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transaction_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transaction-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transaction_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-service:
    container_name: transaction-service
    restart: unless-stopped
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transaction_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - transaction-network

volumes:
  postgres_data:

networks:
  transaction-network:
