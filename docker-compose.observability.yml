version: '3.8'

# Stack de Observabilidade — Financial Microservices Platform
# Uso: docker-compose -f docker-compose.observability.yml up -d
#
# Portas expostas:
#   Prometheus : http://localhost:9090
#   Grafana    : http://localhost:3000  (admin / admin)
#   Loki       : http://localhost:3100
#   Zipkin     : http://localhost:9411

services:

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fintech-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.0.0
    container_name: fintech-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - observability

  loki:
    image: grafana/loki:3.0.0
    container_name: fintech-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - observability

  zipkin:
    image: openzipkin/zipkin:3
    container_name: fintech-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - observability

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
